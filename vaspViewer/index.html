<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
<script  type="module">

import { OrbitControls } from './lib/OrbitControls.js';
var scene = new THREE.Scene();
var camera = new THREE.PerspectiveCamera( 75, window.innerWidth/window.innerHeight, 0.1, 1000 );
var renderer = new THREE.WebGLRenderer();
var controls = new OrbitControls( camera, renderer.domElement );
renderer.setSize( window.innerWidth/3, window.innerHeight );
renderer.setClearColor(0xffffff, 1);
document.getElementById('three').appendChild( renderer.domElement );
controls.update();

import vasp from './vasp.module.js'
document.addEventListener("DOMContentLoaded", function(event) { 
    document.getElementById('POSCARbtn').onclick = ()=>{
        while(scene.children.length > 0){ 
            scene.remove(scene.children[0]); 
        }
        var POSCAR = document.getElementById('POSCAR').value
        vasp.parsePOSCAR(POSCAR).then((result)=>{
            vasp.addAtoms(scene,result.atoms)
            vasp.addLatticeVec(scene,result.latticeVec)
            vasp.setCamera(camera,result.latticeVec)
        })
    }
});

var animate = function () {
    requestAnimationFrame( animate );
    controls.update();
    renderer.render( scene, camera );
};
animate();
</script>

</div>

</html>
